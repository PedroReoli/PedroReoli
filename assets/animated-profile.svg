<svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(0.95); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes typing {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes slideIn {
        0% { opacity: 0; transform: translateX(-10px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes countUp {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      .float { animation: float 4s ease-in-out infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .spin { animation: spin 12s linear infinite; transform-origin: center; }
      .typing { animation: typing 2s ease-in-out infinite; }
      .blink { animation: blink 1s step-end infinite; }
      .slide { animation: slideIn 0.5s ease-out forwards; }
      .count { animation: countUp 1s ease-out forwards; }
      .text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>

    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <linearGradient id="orb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="160" rx="20" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1f1f3a" stroke-width="0.5"/>
  </pattern>
  <rect width="500" height="160" rx="20" fill="url(#grid)" opacity="0.5"/>

  <!-- Decorative circles -->
  <circle cx="50" cy="30" r="80" fill="#7c3aed" opacity="0.05"/>
  <circle cx="450" cy="130" r="100" fill="#06b6d4" opacity="0.05"/>

  <!-- Spinning orbit -->
  <g class="spin" style="transform-origin: 85px 80px">
    <circle cx="85" cy="80" r="35" fill="none" stroke="url(#grad)" stroke-width="1" stroke-dasharray="4 6" opacity="0.4"/>
  </g>

  <!-- Main orbit ring -->
  <g style="transform-origin: 85px 80px">
    <circle cx="85" cy="80" r="25" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.8" filter="url(#softGlow)"/>
  </g>

  <!-- Center avatar placeholder -->
  <circle cx="85" cy="80" r="15" fill="url(#orb)" opacity="0.9"/>
  <text x="85" y="85" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" class="text">PL</text>

  <!-- Online indicator -->
  <circle cx="95" cy="70" r="5" fill="#22c55e" class="pulse"/>
  <text x="105" y="73" fill="#22c55e" font-size="7" class="text">Online</text>

  <!-- Name -->
  <text x="250" y="45" text-anchor="middle" fill="url(#grad)" font-size="22" font-weight="700" class="text">
    Pedro Lucas Reis
  </text>

  <!-- Title -->
  <text x="250" y="65" text-anchor="middle" fill="#94a3b8" font-size="11" class="text">
    Frontend Engineer
  </text>

  <!-- Tech stack pills -->
  <g class="float">
    <rect x="165" y="75" width="45" height="18" rx="9" fill="#7c3aed" opacity="0.2"/>
    <text x="187" y="87" text-anchor="middle" fill="#a78bfa" font-size="8" class="text">React</text>
  </g>
  <g class="float" style="animation-delay: 0.5s">
    <rect x="215" y="75" width="50" height="18" rx="9" fill="#06b6d4" opacity="0.2"/>
    <text x="240" y="87" text-anchor="middle" fill="#22d3ee" font-size="8" class="text">Next.js</text>
  </g>
  <g class="float" style="animation-delay: 1s">
    <rect x="270" y="75" width="55" height="18" rx="9" fill="#3b82f6" opacity="0.2"/>
    <text x="297" y="87" text-anchor="middle" fill="#60a5fa" font-size="8" class="text">TypeScript</text>
  </g>

  <!-- Last commit section -->
  <g transform="translate(165, 105)">
    <rect x="0" y="0" width="170" height="35" rx="10" fill="#1f1f3a" stroke="#2d2d4a" stroke-width="1"/>

    <!-- Git icon -->
    <circle cx="20" cy="17" r="10" fill="#7c3aed" opacity="0.2"/>
    <text x="20" y="21" text-anchor="middle" fill="#a78bfa" font-size="10">⎇</text>

    <!-- Commit message -->
    <text x="38" y="14" fill="#e2e8f0" font-size="9" class="text slide">Update README &amp; workflows</text>

    <!-- Time ago with pulse -->
    <circle cx="38" cy="26" r="3" fill="#22c55e" class="pulse"/>
    <text x="46" y="29" fill="#64748b" font-size="8" class="text">há 2 horas</text>

    <!-- Blinking cursor -->
    <text x="145" y="29" fill="#06b6d4" font-size="10" class="blink">|</text>
  </g>

  <!-- Stats -->
  <g transform="translate(350, 105)">
    <rect x="0" y="0" width="130" height="35" rx="10" fill="#1f1f3a" stroke="#2d2d4a" stroke-width="1"/>

    <!-- Commits count -->
    <g class="count">
      <text x="15" y="15" fill="#a78bfa" font-size="16" font-weight="bold" class="text">47</text>
      <text x="15" y="28" fill="#64748b" font-size="7" class="text">commits</text>
    </g>

    <!-- Streak -->
    <g class="count" style="animation-delay: 0.2s">
      <text x="55" y="15" fill="#22d3ee" font-size="16" font-weight="bold" class="text">12</text>
      <text x="55" y="28" fill="#64748b" font-size="7" class="text">streak</text>
    </g>

    <!-- Contributions -->
    <g class="count" style="animation-delay: 0.4s">
      <text x="95" y="15" fill="#f472b6" font-size="16" font-weight="bold" class="text">203</text>
      <text x="95" y="28" fill="#64748b" font-size="7" class="text">contribs</text>
    </g>
  </g>
</svg>