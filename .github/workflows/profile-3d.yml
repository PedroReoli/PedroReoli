name: GitHub 3D Profile

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@latest
        with:
          config-file: './.github-profile-3d-contribrc.json'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions" && git config user.email "github-actions@github.com"
          git add -A && git diff --staged --quiet || git commit -m "🎮 Update 3D profile" && git push